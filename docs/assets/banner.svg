<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="420" viewBox="0 0 1200 420" role="img" aria-label="Obsidian Plugins — ready-to-install snapshot bundles">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#090c0d"/>
      <stop offset="1" stop-color="#0e1214"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="420" fill="url(#bg)"/>

  <g font-family="'Cascadia Code','JetBrains Mono',Consolas,'DejaVu Sans Mono',monospace" text-anchor="middle">
    <text x="600" y="104" font-size="19" font-weight="700" letter-spacing="5" fill="#879994"><tspan fill="#63f2ab">&#10095;</tspan>&#160;SNAPSHOT BUNDLE</text>
    <text x="600" y="204" font-size="84" font-weight="700" letter-spacing="3"><tspan fill="#dce4df">OBSIDIAN</tspan><tspan fill="#63f2ab">&#160;PLUGINS</tspan></text>
    <line x1="310" y1="240" x2="890" y2="240" stroke="#2a363d" stroke-width="2"/>
    <text x="600" y="286" font-size="19" font-weight="600" letter-spacing="5" fill="#879994">EVERY PLUGIN I USE, PACKAGED AS READY-TO-INSTALL ZIPS</text>
  </g>

  <!-- zip row -->
  <g font-family="'Cascadia Code','JetBrains Mono',Consolas,monospace" font-size="13" text-anchor="middle">
    <rect x="330" y="318" width="160" height="34" rx="8" fill="#13191c" stroke="#2a363d" stroke-width="1.5"/>
    <text x="410" y="340" fill="#b4c3bd">nested-vaults.zip</text>
    <rect x="510" y="318" width="150" height="34" rx="8" fill="#13191c" stroke="#63f2ab" stroke-opacity="0.55" stroke-width="1.5"/>
    <text x="585" y="340" fill="#63f2ab">all-plugins.zip</text>
    <rect x="680" y="318" width="130" height="34" rx="8" fill="#13191c" stroke="#2a363d" stroke-width="1.5"/>
    <text x="745" y="340" fill="#b4c3bd">tidemark.zip</text>
  </g>

  <text x="600" y="396" text-anchor="middle" font-family="'Cascadia Code','JetBrains Mono',Consolas,monospace" font-size="16" fill="#63736f"><tspan fill="#63f2ab" font-weight="700">&#10095;</tspan> unzip all-plugins.zip -d .obsidian/plugins/<tspan fill="#63f2ab">&#9612;</tspan></text>
</svg>
